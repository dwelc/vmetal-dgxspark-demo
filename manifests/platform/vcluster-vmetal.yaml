# vcluster-vmetal.yaml — VirtualClusterInstance backed by DGX Spark bare metal

apiVersion: management.loft.sh/v1
kind: VirtualClusterInstance
metadata:
  name: vmetal-dgx-demo
  namespace: p-default
spec:
  owner:
    user: admin
  templateRef:
    name: vmetal-template
  clusterRef:
    cluster: loft-cluster
  parameters: |
    kubernetesVersion: v1.34.1
    cpuLimit: "5"
