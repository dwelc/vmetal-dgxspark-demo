# Use the server image, not minimal — vCluster join script needs iptables-save.
# Refresh: re-run cache-os-image.sh with UBUNTU_IMAGE_URL set to the server image,
# then update the checksum below to sha256sum of the cached file.

apiVersion: management.loft.sh/v1
kind: OSImage
metadata:
  name: ubuntu-noble-arm64
spec:
  displayName: "Ubuntu 24.04 LTS arm64 (Server)"
  properties:
    metal3.vcluster.com/image-url: "http://172.22.0.1:9000/ubuntu-24.04-server-cloudimg-arm64.img"
    # TODO: replace with the actual sha256 after running cache-os-image.sh
    metal3.vcluster.com/image-checksum: "REPLACE_ME_WITH_sha256sum_OF_DOWNLOADED_FILE"
    metal3.vcluster.com/image-checksum-type: "sha256"
